<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Venue — Gabrielle &amp; Kris</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Caveat:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body data-page="venue">

<header class="nav">
  <div class="wrap nav-in">
    <a class="brand" href="index.html">Gabrielle <span class="amp">&amp;</span> Kris<span class="dot"></span></a>
    <button class="nav-toggle" aria-label="Menu">&#9776;</button>
    <nav class="nav-links">
      <a href="index.html#timeline">Timeline</a>
      <a href="index.html#venues">Venues</a>
      <a href="showdown.html">Showdown</a>
      <a class="nav-board" href="board.html">&#9829; My Board <span class="cnt">0</span></a>
    </nav>
    <div class="auth-area"></div>
  </div>
</header>

<main id="venuePage"><div class="wrap" style="padding:80px 0;text-align:center;color:var(--ink-soft)">Loading venue&hellip;</div></main>

<footer class="foot">
  <div class="wrap">
    <a class="brand" href="index.html">Gabrielle <span class="amp">&amp;</span> Kris<span class="dot"></span></a>
    <span><a href="index.html#venues">All venues</a> &middot; <a href="showdown.html">Showdown</a> &middot; <a href="board.html">My Board</a></span>
    <small>A wedding daydream &middot; August&ndash;December 2028</small>
  </div>
</footer>

<script type="module" src="supabase-config.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="data-store.js"></script>
<script src="image-slot.js"></script>
<script src="data.js"></script>
<script src="venue-editor.js"></script>
<script>
(function(){
  function waitFor(check, timeout, interval){
    timeout = timeout || 5000; interval = interval || 50;
    return new Promise((resolve)=>{
      const start = Date.now();
      (function poll(){
        const v = check();
        if(v) return resolve(v);
        if(Date.now()-start >= timeout) return resolve(null);
        setTimeout(poll, interval);
      })();
    });
  }

  const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
  const enc = s => encodeURIComponent(s);
  const gImages = q => `https://www.google.com/search?tbm=isch&q=${enc(q)}`;
  const pinSearch = q => `https://www.pinterest.com/search/pins/?q=${enc(q)}`;
  const params = new URLSearchParams(location.search);
  const VID = params.get('v');

  function render(v, venues){
    document.body.dataset.venueId = v.id;
    document.body.style.setProperty('--accent', v.vc || 'var(--sea)');
    document.body.style.setProperty('--accent-deep', v.vcDeep || 'var(--sea-deep)');
    document.body.style.setProperty('--accent-tint', `color-mix(in srgb, ${v.vc||'var(--sea)'} 16%, white)`);
    document.title = v.name + " — Gabrielle & Kris";

    const idx = venues.findIndex(x=>x.id===v.id);
    const prev = venues[(idx-1+venues.length)%venues.length];
    const next = venues[(idx+1)%venues.length];
    const term = v.searchTerm || (v.name+" wedding");
    const sources = v.sources || {};

    /* hero */
    const heroHTML = `
    <section class="vhero"><div class="wrap">
      <div class="top">
        <a class="back" href="index.html#venues">&larr; All venues</a>
        <div class="faves">
          <button class="fave" data-venue="${v.id}" data-state="love" aria-pressed="false"><span class="ic">&#9829;</span>Love it</button>
          <button class="fave" data-venue="${v.id}" data-state="maybe" aria-pressed="false"><span class="ic">&#128077;</span>Maybe</button>
          <button class="fave" data-venue="${v.id}" data-state="info" aria-pressed="false"><span class="ic">&#128269;</span>More info</button>
          <button class="vedit" data-act="edit-venue">&#9998; Edit venue</button>
        </div>
      </div>
      <div class="sub">
        <span class="kicker">${esc(v.num||'')}</span>
        <span class="theme"><span class="sq"></span>${esc(v.theme||'')}</span>
        <span>&#9679; ${esc(v.location||'')}</span>
      </div>
      <h1>${esc(v.name)}</h1>
      <div class="vhero-media">
        <image-slot id="${v.id}-hero" shape="rect" fit="cover" placeholder="Drop your hero photo of ${esc(v.name)}"></image-slot>
      </div>
    </div></section>`;

    /* intro */
    const introHTML = `
    <section class="vhero"><div class="wrap"><div class="vintro">
      <div>
        <p class="lead">${esc(v.lead)}</p>
        <span class="note hand">${esc(v.note)}</span>
      </div>
      <div class="why">
        <h4>Why it&rsquo;s interesting</h4>
        <p>${esc(v.why)}</p>
        <div class="tags" style="margin-top:16px">${(v.moods||[]).map(m=>`<span class="tag">${esc(m)}</span>`).join('')}</div>
      </div>
    </div></div></section>`;

    /* gallery */
    let galHTML = `<section class="gal"><div class="wrap">
      <div class="sec-head"><div><span class="kicker">The galleries</span><h2 class="sec-title" style="font-family:var(--font-display);font-weight:800;font-size:clamp(30px,4.4vw,52px);letter-spacing:-.02em;margin:.25em 0 0;line-height:1">What it feels like to marry here</h2></div><p>Every frame is a drop-zone. Hit <strong>&#128269; Find photos</strong> on any frame, then drag a picture you love straight onto it &mdash; even from another browser tab. Already filled? <strong>Hover it for Replace / Remove.</strong> Tap the <strong>&#9825;</strong> to pin it to your board.</p></div>
      <div class="srcbar">
        <span class="srclabel">&#128247; Find ${esc(v.name)} photos:</span>
        ${sources.site?`<a class="srcbtn" href="${esc(sources.site)}" target="_blank" rel="noopener">&#127760; Official site &nearr;</a>`:''}
        ${sources.ig?`<a class="srcbtn" href="${esc(sources.ig)}" target="_blank" rel="noopener">&#128248; Instagram ${sources.igLabel?`<span class="muted">${esc(sources.igLabel)}</span>`:''} &nearr;</a>`:''}
        <a class="srcbtn" href="${pinSearch(term)}" target="_blank" rel="noopener">&#128204; Pinterest &nearr;</a>
        <a class="srcbtn" href="${gImages(term)}" target="_blank" rel="noopener">&#128269; Google Images &nearr;</a>
      </div>`;
    (WED.galleryCats||[]).forEach(cat=>{
      const shots = (v.shots && v.shots[cat.key]) || [];
      if(!shots.length) return;
      galHTML += `<div class="gal-cat">
        <div class="ghead"><span class="gn">${esc(cat.gn)}</span><h3>${esc(cat.title)}</h3>
          <a class="catsearch" href="${gImages(term+' '+cat.title)}" target="_blank" rel="noopener" title="Search images for ${esc(cat.title)}">&#128269; search this category &nearr;</a></div>
        <p class="gq">&ldquo;${esc(cat.q)}&rdquo;</p>
        <div class="masonry">`;
      shots.forEach((s,i)=>{
        const id = `${v.id}-${cat.key}-${i}`;
        const h = [320,240,280,360,260][i%5];
        galHTML += `<div class="cell">
          <a class="findbtn" href="${gImages(term+' '+s)}" target="_blank" rel="noopener" title="Find a photo: ${esc(s)}">&#128269;<span>Find photos</span></a>
          <button class="pinbtn" data-pin-id="${id}" data-venue="${v.id}" data-venue-name="${esc(v.name)}" data-cat="${esc(cat.title)}" data-caption="${esc(s)}" aria-label="Pin to board">&#9825;</button>
          <image-slot id="${id}" shape="rounded" radius="14" fit="cover" style="height:${h}px" placeholder="${esc(s)}"></image-slot>
        </div>`;
      });
      galHTML += `</div></div>`;
    });
    galHTML += `</div></section>`;

    /* included */
    let inclHTML = '';
    if((v.included||[]).length){
      inclHTML = `<section class="incl"><div class="wrap">
        <div class="sec-head"><div><span class="kicker">The practical magic</span><h2 style="font-family:var(--font-display);font-weight:800;font-size:clamp(30px,4.4vw,52px);letter-spacing:-.02em;margin:.25em 0 0;line-height:1">What&rsquo;s included</h2></div><p>The good stuff this venue brings to the table &mdash; researched, not guessed.</p></div>
        <div class="incl-grid">`;
      v.included.forEach(c=>{
        inclHTML += `<div class="incl-card"><div class="ic">${esc(c.ic)}</div><h4>${esc(c.title)}</h4><p>${esc(c.desc)}</p></div>`;
      });
      inclHTML += `</div></div></section>`;
    }

    /* notes */
    const notesHTML = `<section class="notes"><div class="wrap"><div class="box">
      <h3>Notes on ${esc(v.name)}</h3>
      <p class="prompt">What stands out to you about this venue? (Saved automatically, shared with the family.)</p>
      <textarea data-note-venue="${v.id}" placeholder="e.g. love the sunset ceremony spot... but how far is the airport?"></textarea>
      <div class="saved" data-note-saved="${v.id}"></div>
    </div></div></section>`;

    /* prev / next */
    const navHTML = venues.length>1 ? `<section class="vhero"><div class="wrap"><div class="vnav">
      <a class="prev" href="venue.html?v=${enc(prev.id)}"><div class="lbl">&larr; Previous</div><div class="nm">${esc(prev.name)}</div></a>
      <a class="next" href="venue.html?v=${enc(next.id)}"><div class="lbl">Next &rarr;</div><div class="nm">${esc(next.name)}</div></a>
    </div></div></section>` : '';

    document.getElementById('venuePage').innerHTML = heroHTML+introHTML+galHTML+inclHTML+notesHTML+navHTML;

    const editBtn = document.querySelector('[data-act="edit-venue"]');
    if(editBtn) editBtn.addEventListener('click', ()=>{
      window.WedVenueEditor.openEdit(v, (result)=>{
        if(result.deleted){ location.href = 'index.html#venues'; }
        else { location.reload(); }
      });
    });

    waitFor(()=>window.WedApp).then(app=>{
      if(!app) return;
      app.initFaves(); app.initNotes(); app.initPinButtons();
    });
  }

  (async ()=>{
    const store = await waitFor(()=>window.WedStore);
    const WED_ready = await waitFor(()=>window.WED);
    if(!store || !WED_ready){
      document.getElementById('venuePage').innerHTML = '<div class="wrap" style="padding:80px 0">Could not load venue data.</div>';
      return;
    }
    const venues = await store.getVenues();
    const v = venues.find(x=>x.id===VID) || venues[0];
    if(!v){
      document.getElementById('venuePage').innerHTML = '<div class="wrap" style="padding:80px 0;text-align:center">No venues yet. <a href="index.html#venues">Add one &rarr;</a></div>';
      return;
    }
    render(v, venues);
  })();
})();
</script>
<script src="app.js"></script>
</body>
</html>
