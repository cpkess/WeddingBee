<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Venue — Gabrielle &amp; Kris</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Caveat:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body data-page="venue">

<div id="gateOverlay"></div>

<header class="nav">
  <div class="wrap nav-in">
    <a class="brand" href="index.html">Gabrielle <span class="amp">&amp;</span> Kris<span class="dot"></span></a>
    <button class="nav-toggle" aria-label="Menu">&#9776;</button>
    <nav class="nav-links">
      <a href="index.html#timeline">Timeline</a>
      <a href="index.html#venues">Venues</a>
      <a href="showdown.html">Showdown</a>
      <a class="nav-board" href="board.html">&#9829; My Board <span class="cnt">0</span></a>
      <a href="admin.html" class="nav-admin" style="display:none">Admin</a>
    </nav>
    <div class="auth-area"></div>
  </div>
</header>

<main id="venuePage"><div class="wrap" style="padding:80px 0;text-align:center;color:var(--ink-soft)">Loading venue&hellip;</div></main>

<footer class="foot">
  <div class="wrap">
    <a class="brand" href="index.html">Gabrielle <span class="amp">&amp;</span> Kris<span class="dot"></span></a>
    <span><a href="index.html#venues">All venues</a> &middot; <a href="showdown.html">Showdown</a> &middot; <a href="board.html">My Board</a></span>
    <small>A wedding daydream &middot; August&ndash;December 2028</small>
  </div>
</footer>

<script type="module" src="supabase-config.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="gate.js"></script>
<script type="module" src="data-store.js"></script>
<script src="image-slot.js"></script>
<script src="data.js"></script>
<script>
(function(){
  function waitFor(check, timeout, interval){
    timeout = timeout || 5000; interval = interval || 50;
    return new Promise((resolve)=>{
      const start = Date.now();
      (function poll(){
        const v = check();
        if(v) return resolve(v);
        if(Date.now()-start >= timeout) return resolve(null);
        setTimeout(poll, interval);
      })();
    });
  }

  const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
  const enc = s => encodeURIComponent(s);
  const gImages = q => `https://www.google.com/search?tbm=isch&q=${enc(q)}`;
  const pinSearch = q => `https://www.pinterest.com/search/pins/?q=${enc(q)}`;
  const params = new URLSearchParams(location.search);
  const VID = params.get('v');

  function render(v, venues){
    document.body.dataset.venueId = v.id;
    document.body.style.setProperty('--accent', v.vc || 'var(--sea)');
    document.body.style.setProperty('--accent-deep', v.vcDeep || 'var(--sea-deep)');
    document.body.style.setProperty('--accent-tint', `color-mix(in srgb, ${v.vc||'var(--sea)'} 16%, white)`);
    document.title = v.name + " — Gabrielle & Kris";

    const idx = venues.findIndex(x=>x.id===v.id);
    const prev = venues[(idx-1+venues.length)%venues.length];
    const next = venues[(idx+1)%venues.length];
    const term = v.searchTerm || (v.name+" wedding");
    const sources = v.sources || {};

    /* hero */
    const heroHTML = `
    <section class="vhero"><div class="wrap">
      <div class="top">
        <a class="back" href="index.html#venues">&larr; All venues</a>
        <div class="faves">
          <button class="fave" data-venue="${v.id}" data-state="love" aria-pressed="false"><span class="ic">&#9829;</span>Love it</button>
          <button class="fave" data-venue="${v.id}" data-state="maybe" aria-pressed="false"><span class="ic">&#128077;</span>Maybe</button>
          <button class="fave" data-venue="${v.id}" data-state="info" aria-pressed="false"><span class="ic">&#128269;</span>More info</button>
          <button class="vedit" id="editToggle">&#9998; Edit venue</button>
        </div>
      </div>
      <div class="edit-only edit-toolbar">
        <label class="swatch">Accent <input type="color" data-field="vc" value="${/^#/.test(v.vc||'')?v.vc:'#0FB5BC'}"></label>
        <label class="swatch">Accent (deep) <input type="color" data-field="vcDeep" value="${/^#/.test(v.vcDeep||'')?v.vcDeep:'#0A8A90'}"></label>
        <button class="vedit" id="deleteVenue">&#128465; Delete venue</button>
      </div>
      <div class="sub">
        <span class="theme"><span class="sq"></span><span data-field="theme" data-editable="text">${esc(v.theme||'')}</span></span>
        <span>&#9679; <span data-field="location" data-editable="text">${esc(v.location||'')}</span></span>
      </div>
      <h1 data-field="name" data-editable="text">${esc(v.name)}</h1>
      <div class="vhero-media">
        <image-slot id="${v.id}-hero" shape="rect" fit="cover" placeholder="Drop your hero photo of ${esc(v.name)}"></image-slot>
      </div>
    </div></section>`;

    /* intro */
    function moodsViewHTML(){
      return (v.moods||[]).map(m=>`<span class="tag">${esc(m)}</span>`).join('');
    }
    const introHTML = `
    <section class="vhero"><div class="wrap"><div class="vintro">
      <div>
        <p class="lead" data-field="lead" data-editable="text">${esc(v.lead)}</p>
        <span class="note hand" data-field="note" data-editable="text">${esc(v.note)}</span>
      </div>
      <div class="why">
        <h4>Why it&rsquo;s interesting</h4>
        <p data-field="why" data-editable="text">${esc(v.why)}</p>
        <div class="tags view-only" id="moodsView" style="margin-top:16px">${moodsViewHTML()}</div>
        <input class="edit-only edit-input" id="moodsEdit" data-field="moods" value="${esc((v.moods||[]).join(', '))}" placeholder="Tropical, Elegant, Fun" style="margin-top:16px">
      </div>
    </div></div></section>`;

    /* gallery */
    function srcbarHTML(){
      const s = v.sources || {};
      const t = v.searchTerm || (v.name+" wedding");
      return `<span class="srclabel">&#128247; Find ${esc(v.name)} photos:</span>
        ${s.site?`<a class="srcbtn" href="${esc(s.site)}" target="_blank" rel="noopener">&#127760; Official site &nearr;</a>`:''}
        ${s.ig?`<a class="srcbtn" href="${esc(s.ig)}" target="_blank" rel="noopener">&#128248; Instagram ${s.igLabel?`<span class="muted">${esc(s.igLabel)}</span>`:''} &nearr;</a>`:''}
        <a class="srcbtn" href="${pinSearch(t)}" target="_blank" rel="noopener">&#128204; Pinterest &nearr;</a>
        <a class="srcbtn" href="${gImages(t)}" target="_blank" rel="noopener">&#128269; Google Images &nearr;</a>`;
    }
    let galHTML = `<section class="gal"><div class="wrap">
      <div class="sec-head"><div><span class="kicker">The galleries</span><h2 class="sec-title" style="font-family:var(--font-display);font-weight:800;font-size:clamp(30px,4.4vw,52px);letter-spacing:-.02em;margin:.25em 0 0;line-height:1">What it feels like to marry here</h2></div><p>Every frame is a drop-zone &mdash; drag a picture you love straight onto it, even from another browser tab. Already filled? <strong>Hover it for Replace / Remove.</strong> Tap the <strong>&#9825;</strong> to pin it to your board.</p></div>
      <div class="srcbar view-only" id="srcbar">${srcbarHTML()}</div>
      <div class="edit-only edit-row srcbar-edit">
        <label class="edit-input-wrap">Site URL<input class="edit-input" data-field="sources.site" value="${esc(sources.site)}" placeholder="https://"></label>
        <label class="edit-input-wrap">Site label<input class="edit-input" data-field="sources.siteLabel" value="${esc(sources.siteLabel)}" placeholder="example.com"></label>
        <label class="edit-input-wrap">Instagram URL<input class="edit-input" data-field="sources.ig" value="${esc(sources.ig)}" placeholder="https://instagram.com/..."></label>
        <label class="edit-input-wrap">Instagram label<input class="edit-input" data-field="sources.igLabel" value="${esc(sources.igLabel)}" placeholder="@handle"></label>
        <label class="edit-input-wrap">Search term<input class="edit-input" data-field="searchTerm" value="${esc(v.searchTerm)}" placeholder="Venue name + wedding"></label>
      </div>`;
    const heights = [320,240,280,360,260];
    function shotCellHTML(cat, id, caption, h, idx){
      return `<div class="cell">
          <button class="pinbtn" data-pin-id="${id}" data-venue="${v.id}" data-venue-name="${esc(v.name)}" data-cat="${esc(cat.title)}" data-caption="${esc(caption)}" aria-label="Pin to board">&#9825;</button>
          <image-slot id="${id}" shape="rounded" radius="14" fit="cover" style="height:${h}px" placeholder="${esc(caption)}" data-cat-key="${esc(cat.key)}" data-idx="${idx}"></image-slot>
        </div>`;
    }
    function addTileHTML(cat, id, h){
      return `<div class="cell cell-add">
          <image-slot id="${id}" class="add-slot" shape="rounded" radius="14" fit="cover" style="height:${h}px" data-cat-key="${esc(cat.key)}" placeholder="+ Add a photo"></image-slot>
        </div>`;
    }
    function masonryHTML(cat){
      const shots = v.shots[cat.key] || (v.shots[cat.key]=[]);
      let html = '';
      const store = window.ImageSlotStore;
      shots.forEach((_,i)=>{
        const id = `${v.id}-${cat.key}-${i}`;
        const stored = store && store.get(id);
        if(!stored || !stored.u) return;
        html += shotCellHTML(cat, id, '', heights[i%heights.length], i);
      });
      html += addTileHTML(cat, `${v.id}-${cat.key}-${shots.length}`, heights[shots.length%heights.length]);
      return html;
    }
    (WED.galleryCats||[]).forEach(cat=>{
      galHTML += `<div class="gal-cat" data-cat-key="${esc(cat.key)}">
        <div class="ghead"><span class="gn">${esc(cat.gn)}</span><h3>${esc(cat.title)}</h3>
          <a class="catsearch" href="${gImages(term+' '+cat.title)}" target="_blank" rel="noopener" title="Search images for ${esc(cat.title)}">&#128269; search this category &nearr;</a></div>
        <p class="gq">&ldquo;${esc(cat.q)}&rdquo;</p>
        <div class="masonry">${masonryHTML(cat)}</div></div>`;
    });
    galHTML += `</div></section>`;

    /* included */
    function inclViewHTML(){
      return (v.included||[]).map(c=>
        `<div class="incl-card"><div class="ic">${esc(c.ic)}</div><h4>${esc(c.title)}</h4><p>${esc(c.desc)}</p></div>`
      ).join('');
    }
    function inclEditRowHTML(c, i){
      c = c || {ic:'',title:'',desc:''};
      return `<div class="ve-incl-row" data-incl-idx="${i}">
        <input class="ve-incl-ic edit-input" data-field="included.${i}.ic" value="${esc(c.ic)}" placeholder="\u{1F4CC}" maxlength="4">
        <input class="ve-incl-title edit-input" data-field="included.${i}.title" value="${esc(c.title)}" placeholder="Title">
        <input class="ve-incl-desc edit-input" data-field="included.${i}.desc" value="${esc(c.desc)}" placeholder="Description">
        <button type="button" class="ve-incl-remove" data-act="remove-incl" aria-label="Remove">&times;</button>
      </div>`;
    }
    function inclEditHTML(){
      return (v.included||[]).map((c,i)=>inclEditRowHTML(c,i)).join('')
        + `<button type="button" class="vedit" id="addInclItem">+ Add item</button>`;
    }
    const inclHTML = `<section class="incl" id="inclSection"${(v.included||[]).length?'':' style="display:none"'}><div class="wrap">
      <div class="sec-head"><div><span class="kicker">The practical magic</span><h2 style="font-family:var(--font-display);font-weight:800;font-size:clamp(30px,4.4vw,52px);letter-spacing:-.02em;margin:.25em 0 0;line-height:1">What&rsquo;s included</h2></div><p>The good stuff this venue brings to the table &mdash; researched, not guessed.</p></div>
      <div class="incl-grid view-only" id="inclView">${inclViewHTML()}</div>
      <div class="edit-only ve-incl-list" id="inclEdit">${inclEditHTML()}</div>
    </div></section>`;

    /* notes */
    const notesHTML = `<section class="notes"><div class="wrap"><div class="box">
      <h3>Notes on ${esc(v.name)}</h3>
      <p class="prompt">What stands out to you about this venue? (Saved automatically, shared with the family.)</p>
      <textarea data-note-venue="${v.id}" placeholder="e.g. love the sunset ceremony spot... but how far is the airport?"></textarea>
      <div class="saved" data-note-saved="${v.id}"></div>
    </div></div></section>`;

    /* prev / next */
    const navHTML = venues.length>1 ? `<section class="vhero"><div class="wrap"><div class="vnav">
      <a class="prev" href="venue.html?v=${enc(prev.id)}"><div class="lbl">&larr; Previous</div><div class="nm">${esc(prev.name)}</div></a>
      <a class="next" href="venue.html?v=${enc(next.id)}"><div class="lbl">Next &rarr;</div><div class="nm">${esc(next.name)}</div></a>
    </div></div></section>` : '';

    document.getElementById('venuePage').innerHTML = heroHTML+introHTML+galHTML+inclHTML+notesHTML+navHTML;
    const main = document.getElementById('venuePage');

    /* ---- inline editing ---- */
    function setField(obj, path, value){
      const parts = path.split('.');
      let o = obj;
      for(let i=0;i<parts.length-1;i++){
        const k = parts[i];
        if(o[k]==null) o[k] = /^\d+$/.test(parts[i+1]) ? [] : {};
        o = o[k];
      }
      o[parts[parts.length-1]] = value;
    }
    function applyAccentColors(){
      document.body.style.setProperty('--accent', v.vc || 'var(--sea)');
      document.body.style.setProperty('--accent-deep', v.vcDeep || 'var(--sea-deep)');
      document.body.style.setProperty('--accent-tint', `color-mix(in srgb, ${v.vc||'var(--sea)'} 16%, white)`);
    }
    function renderMoodsView(){
      const el = document.getElementById('moodsView');
      if(el) el.innerHTML = moodsViewHTML();
    }
    const srcbarEl = document.getElementById('srcbar');
    function renderSrcbar(){
      if(srcbarEl) srcbarEl.innerHTML = srcbarHTML();
    }
    const inclSection = document.getElementById('inclSection');
    const inclViewEl = document.getElementById('inclView');
    const inclEditEl = document.getElementById('inclEdit');
    function renderInclView(){
      if(inclViewEl) inclViewEl.innerHTML = inclViewHTML();
      if(inclSection && !editing) inclSection.style.display = (v.included||[]).length ? '' : 'none';
    }
    function renderInclEdit(){
      if(inclEditEl) inclEditEl.innerHTML = inclEditHTML();
    }

    let editing = false;
    function setEditing(on){
      editing = on;
      document.body.classList.toggle('editing', on);
      main.querySelectorAll('[data-editable="text"]').forEach(el=>{
        el.contentEditable = on ? 'true' : 'false';
      });
      editToggle.innerHTML = on ? '&#10003; Done editing' : '&#9998; Edit venue';
      if(on){
        if(inclSection) inclSection.style.display = '';
      } else {
        flushSave();
        renderInclView();
      }
    }
    const editToggle = document.getElementById('editToggle');
    editToggle.addEventListener('click', ()=>{
      if(!editing){
        const auth = window.WedAuth;
        if(!auth || !auth.isSignedIn()){
          if(window.wedToast) window.wedToast('Sign in to edit this venue','\u{1F510}');
          if(auth) auth.signIn();
          return;
        }
      }
      setEditing(!editing);
    });

    document.getElementById('deleteVenue').addEventListener('click', async ()=>{
      if(!confirm(`Delete ${v.name}? This can't be undone.`)) return;
      const store = await waitFor(()=>window.WedStore);
      try{
        await store.deleteVenue(v.id);
        location.href = 'index.html#venues';
      }catch(e){ if(window.wedToast) window.wedToast('Could not delete — try again',''); }
    });

    main.addEventListener('input', (e)=>{
      const el = e.target.closest && e.target.closest('[data-field]');
      if(!el || !editing) return;
      const field = el.dataset.field;
      const value = (el.tagName==='INPUT') ? el.value : el.textContent;
      if(field==='moods'){
        v.moods = value.split(',').map(s=>s.trim()).filter(Boolean);
        renderMoodsView();
      } else if(field==='vc' || field==='vcDeep'){
        setField(v, field, value);
        applyAccentColors();
      } else if(field.startsWith('sources.') || field==='searchTerm'){
        setField(v, field, value);
        renderSrcbar();
      } else {
        setField(v, field, value);
      }
      scheduleSave();
    });

    main.addEventListener('click', (e)=>{
      if(!editing) return;
      const removeBtn = e.target.closest && e.target.closest('[data-act="remove-incl"]');
      if(removeBtn){
        const row = removeBtn.closest('[data-incl-idx]');
        const i = parseInt(row.dataset.inclIdx,10);
        v.included.splice(i,1);
        renderInclEdit();
        renderInclView();
        scheduleSave();
        return;
      }
      if(e.target.id==='addInclItem'){
        v.included = v.included || [];
        v.included.push({ic:'',title:'',desc:''});
        renderInclEdit();
        scheduleSave();
      }
    });

    /* ---- on-page gallery photo adding ---- */
    let saveTimer;
    function scheduleSave(){
      clearTimeout(saveTimer);
      saveTimer = setTimeout(()=>{ saveTimer = null; flushSave(); }, 600);
    }
    function flushSave(){
      if(saveTimer){ clearTimeout(saveTimer); saveTimer = null; }
      (async ()=>{
        const store = await waitFor(()=>window.WedStore);
        if(!store) return;
        try{ await store.upsertVenue(v); }
        catch(e){
          const app = await waitFor(()=>window.WedApp);
          if(app) app.toast('Sign in to save your changes','\u{1F510}');
        }
      })();
    }
    function rewire(){
      waitFor(()=>window.WedApp).then(app=>{ if(app) app.initPinButtons(); });
    }
    function promote(slotEl){
      const catKey = slotEl.dataset.catKey;
      const cat = (WED.galleryCats||[]).find(c=>c.key===catKey);
      if(!cat) return;
      const shots = v.shots[catKey] || (v.shots[catKey]=[]);
      const idx = shots.length;
      shots.push('');
      const cell = slotEl.closest('.cell');
      const masonry = cell.parentElement;
      const id = slotEl.id;
      cell.insertAdjacentHTML('afterend', shotCellHTML(cat, id, '', heights[idx%heights.length], idx));
      cell.remove();
      const newAddId = `${v.id}-${catKey}-${shots.length}`;
      masonry.insertAdjacentHTML('beforeend', addTileHTML(cat, newAddId, heights[shots.length%heights.length]));
      rewire();
      scheduleSave();
    }
    function deleteSlot(catKey, idx){
      const cat = (WED.galleryCats||[]).find(c=>c.key===catKey);
      const shots = v.shots[catKey] || [];
      if(!cat || idx<0 || idx>=shots.length) return;
      const store = window.ImageSlotStore;
      if(store){
        for(let j=idx+1;j<shots.length;j++){
          const val = store.get(`${v.id}-${catKey}-${j}`);
          store.set(`${v.id}-${catKey}-${j-1}`, val || null);
        }
        store.set(`${v.id}-${catKey}-${shots.length-1}`, null);
      }
      shots.splice(idx,1);
      const masonry = document.querySelector(`.gal-cat[data-cat-key="${CSS.escape(catKey)}"] .masonry`);
      if(masonry) masonry.innerHTML = masonryHTML(cat);
      rewire();
      scheduleSave();
    }
    main.addEventListener('imageslot-fill', (e)=>{
      const el = e.target;
      if(el && el.classList && el.classList.contains('add-slot')) promote(el);
    });
    main.addEventListener('imageslot-clear', (e)=>{
      const el = e.target;
      if(el && el.dataset && el.dataset.idx !== undefined){
        deleteSlot(el.dataset.catKey, parseInt(el.dataset.idx,10));
      }
    });
    main.addEventListener('drop', (e)=>{
      const slot = e.target && e.target.closest && e.target.closest('.add-slot');
      if(!slot) return;
      const files = e.dataTransfer && e.dataTransfer.files;
      if(!files || files.length<=1) return;
      e.preventDefault();
      e.stopPropagation();
      const catKey = slot.dataset.catKey;
      const cat = (WED.galleryCats||[]).find(c=>c.key===catKey);
      if(!cat) return;
      const shots = v.shots[catKey] || (v.shots[catKey]=[]);
      const startIdx = shots.length;
      const fileArr = Array.from(files);
      const cell = slot.closest('.cell');
      const masonry = cell.parentElement;
      cell.remove();
      fileArr.forEach((file,k)=>{
        const idx = startIdx+k;
        shots.push('');
        const id = `${v.id}-${catKey}-${idx}`;
        masonry.insertAdjacentHTML('beforeend', shotCellHTML(cat, id, '', heights[idx%heights.length], idx));
      });
      const newAddId = `${v.id}-${catKey}-${shots.length}`;
      masonry.insertAdjacentHTML('beforeend', addTileHTML(cat, newAddId, heights[shots.length%heights.length]));
      fileArr.forEach((file,k)=>{
        const idx = startIdx+k;
        const id = `${v.id}-${catKey}-${idx}`;
        const el = document.getElementById(id);
        if(el && el.ingestFile) el.ingestFile(file);
      });
      rewire();
      scheduleSave();
    }, true);

    waitFor(()=>window.WedApp).then(app=>{
      if(!app) return;
      app.initFaves(); app.initNotes(); app.initPinButtons();
    });
  }

  (async ()=>{
    const store = await waitFor(()=>window.WedStore);
    const WED_ready = await waitFor(()=>window.WED);
    const imgStore = await waitFor(()=>window.ImageSlotStore);
    if(imgStore && imgStore.ready) await imgStore.ready;
    if(!store || !WED_ready){
      document.getElementById('venuePage').innerHTML = '<div class="wrap" style="padding:80px 0">Could not load venue data.</div>';
      return;
    }
    const venues = await store.getVenues();
    const v = venues.find(x=>x.id===VID) || venues[0];
    if(!v){
      document.getElementById('venuePage').innerHTML = '<div class="wrap" style="padding:80px 0;text-align:center">No venues yet. <a href="index.html#venues">Add one &rarr;</a></div>';
      return;
    }
    render(v, venues);
  })();
})();
</script>
<script src="app.js"></script>
</body>
</html>
