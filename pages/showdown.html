<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Gallery Showdown — Gabrielle &amp; Kris</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Caveat:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body data-page="showdown">

<header class="nav">
  <div class="wrap nav-in">
    <a class="brand" href="index.html">Gabrielle <span class="amp">&amp;</span> Kris<span class="dot"></span></a>
    <button class="nav-toggle" aria-label="Menu">&#9776;</button>
    <nav class="nav-links">
      <a href="index.html#timeline">Timeline</a>
      <a href="index.html#venues">Venues</a>
      <a href="showdown.html" class="active">Showdown</a>
      <a class="nav-board" href="board.html">&#9829; My Board <span class="cnt">0</span></a>
    </nav>
  </div>
</header>

<section class="sd-hero"><div class="wrap">
  <span class="kicker" style="--accent-deep:var(--coral-deep)">Head to head</span>
  <h1>Which wedding can you picture?</h1>
  <p>The strongest imagery from all five, side by side. Filter by the mood you&rsquo;re feeling &mdash; then go with your gut.</p>
  <div class="sd-filter" id="sdFilter"></div>
</div></section>

<section class="venues"><div class="wrap" id="sdRows"></div></section>

<footer class="foot">
  <div class="wrap">
    <a class="brand" href="index.html">Gabrielle <span class="amp">&amp;</span> Kris<span class="dot"></span></a>
    <span><a href="index.html#venues">Venues</a> &middot; <a href="board.html">My Board</a></span>
    <small>Trust the gut &middot; August&ndash;December 2028</small>
  </div>
</footer>

<script src="image-slot.js"></script>
<script src="data.js"></script>
<script>
(function(){
  // mood chips
  const moods=[]; WED.venues.forEach(v=>v.moods.forEach(m=>{ if(!moods.includes(m)) moods.push(m); }));
  const f=document.getElementById('sdFilter');
  f.innerHTML = `<button class="tag" data-mood-chip="all" aria-pressed="true" style="cursor:pointer;border:1.5px solid var(--ink);background:var(--ink);color:var(--cream)">All venues</button>`
    + moods.map(m=>`<button class="tag ghost" data-mood-chip="${m}" aria-pressed="false" style="cursor:pointer">${m}</button>`).join('');

  // rows
  const rows=document.getElementById('sdRows');
  WED.venues.forEach(v=>{
    // reuse the same slot ids used on venue pages so dropped photos appear here too
    const ids=[`${v.id}-hero`,`${v.id}-signature-0`,`${v.id}-ceremony-0`,`${v.id}-reception-0`,`${v.id}-area-0`,`${v.id}-signature-2`,`${v.id}-guest-0`];
    const caps=['hero','signature','ceremony','reception','area','signature','guest experience'];
    const row=document.createElement('div'); row.className='sd-row'; row.dataset.rowMoods=v.moods.join('|');
    row.style.setProperty('--accent',v.vc);
    row.innerHTML=`
      <div class="rhead">
        <span class="rsq" style="background:${v.vc}"></span>
        <a href="${v.slug}.html"><h3>${v.name}</h3></a>
        <span class="rloc">${v.location}</span>
        <span class="tags" style="margin-left:auto">${v.moods.map(m=>`<span class="tag" style="background:color-mix(in srgb, ${v.vc} 16%, white);color:${v.vcDeep}">${m}</span>`).join('')}</span>
      </div>
      <div class="sd-strip">${ids.map((id,i)=>`<image-slot id="${id}" shape="rounded" radius="12" fit="cover" placeholder="${v.name.split(' ')[0]} — ${caps[i]}"></image-slot>`).join('')}</div>`;
    rows.appendChild(row);
  });
})();
</script>
<script src="app.js"></script>
</body>
</html>
